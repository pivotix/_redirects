<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIVOTIX | Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}

.hero{

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:50px 8%;

background:
radial-gradient(circle at 80% 20%, rgba(255,98,0,.25), transparent 35%),
linear-gradient(to bottom,#070707,#000000);

}

.container{

max-width:1400px;
width:100%;

display:grid;
grid-template-columns:1fr 1fr;
gap:80px;
align-items:center;

}

.logo{

font-size:42px;
font-weight:800;
letter-spacing:3px;
margin-bottom:20px;

}

.logo span{
color:#ff6200;
}

.tagline{

font-size:88px;
font-weight:800;
line-height:0.95;

}

.orange{
color:#ff6200;
}

.description{

margin-top:35px;

font-size:24px;
line-height:1.7;

color:#d1d1d1;

max-width:550px;

}

.btn{

display:inline-block;

margin-top:40px;

padding:18px 45px;

border:2px solid #ff6200;

color:#ff6200;

text-decoration:none;

font-weight:700;

letter-spacing:2px;

transition:.3s;

}

.btn:hover{

background:#ff6200;
color:white;

}

.product-image{

width:100%;
max-width:700px;

display:block;
margin:auto;

filter:
drop-shadow(0 0 30px rgba(255,98,0,.15));

}

.launch{

padding:100px 30px;

text-align:center;

background:#000;

}

.launch h2{

font-size:60px;
font-weight:800;

}

.launch span{
color:#ff6200;
}

.launch p{

margin-top:15px;

font-size:20px;
letter-spacing:2px;

color:#d1d1d1;

}

.social{

margin-top:50px;

}

.social a{

color:white;
text-decoration:none;

font-size:18px;

margin:0 15px;

opacity:.8;

}

.social a:hover{

opacity:1;

}

footer{

padding:30px;

text-align:center;

border-top:1px solid rgba(255,255,255,.08);

color:#888;

font-size:14px;

}

@media(max-width:980px){

.container{

grid-template-columns:1fr;
text-align:center;

}

.tagline{

font-size:60px;

}

.description{

margin-left:auto;
margin-right:auto;

font-size:20px;

}

.product-image{

max-width:500px;

}

}

@media(max-width:576px){

.tagline{
font-size:46px;
}

.launch h2{
font-size:40px;
}

.description{
font-size:18px;
}

}

</style>

</head>

<body>

<section class="hero">

<div class="container">

<div>

<div class="logo">
PIVOT<span>IX</span>
</div>

<div class="tagline">

PIVOT.<br>
POWER.<br>
<span class="orange">PRECISION.</span>

</div>

<div class="description">

Next Generation Pickleball Paddles.<br>
Engineered for Performance.

</div>

<a href="#launch" class="btn">
COMING SOON
</a>

</div>

<div>

<img
src="pivotix-paddle.jpg"
alt="Pivotix Paddle"
class="product-image"
>

</div>

</div>

</section>

<section id="launch" class="launch">

<h2>
LAUNCHING <span>SOON</span>
</h2>

<p>
BE THE FIRST TO KNOW
</p>

<div class="social">

<a href="#">Instagram</a>

<a href="#">Facebook</a>

</div>

</section>

<footer>

© 2026 PIVOTIX PICKLEBALL<br>
ALL RIGHTS RESERVED.

</footer>

</body>
</html>
